# Kitty Terminal Config untuk Test (Rocky Linux + Wayland)

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 12.0

# Eye Candy Settings
background_opacity 0.85
dynamic_background_opacity yes
window_padding_width 15

# Hilangkan border dan titlebar native dari wayland/X11
hide_window_decorations yes
linux_display_server wayland

# Warna adaptif dari matugen (dioverwrite tiap ganti wallpaper).
# Fallback: kitty pakai warna default bila file belum ada.
include colors.conf

# Cursor
cursor_shape beam
cursor_blink_interval 0.5

# GhostAnimation — trail ghost mengikuti kursor saat gerak cepat (nvim, dll.)
cursor_trail 1
cursor_trail_decay 0.25 0.45
cursor_trail_start_threshold 3

# Tabs
tab_bar_style powerline

# Disable audio bell
enable_audio_bell no

# Animasi scrolling
scrollback_lines 10000
wheel_scroll_multiplier 5.0

# Shell — kitty mendeteksi default shell dari $SHELL
# Uncomment baris di bawah jika ingin paksa shell tertentu:
shell fish


term xterm-256color
